name: CI

on:
  push:
    branches: [main, "main-copy", "feature/**"]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Lint & format - Python (agent, Odoo module, Lambda) via ruff
  # ---------------------------------------------------------------------------
  lint:
    name: Lint & format (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff==0.15.20

      - name: Ruff check
        run: |
          ruff check agent
          ruff check custom_addons
          ruff check lambda

      - name: Ruff format (check only)
        run: |
          ruff format --check agent
          ruff format --check custom_addons
          ruff format --check lambda

  # ---------------------------------------------------------------------------
  # FastAPI + LangGraph agent unit tests
  # ---------------------------------------------------------------------------
  agent-tests:
    name: Agent tests (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: agent/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest -q

  # ---------------------------------------------------------------------------
  # Webhook authorizer Lambda unit tests
  # ---------------------------------------------------------------------------
  lambda-tests:
    name: Lambda tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test deps
        run: pip install boto3==1.43.37 pytest==8.3.4

      - name: Run tests
        run: pytest lambda/tests -q

  # ---------------------------------------------------------------------------
  # Odoo module install + tests against a real Odoo 19 + Postgres
  # ---------------------------------------------------------------------------
  odoo-tests:
    name: Odoo module tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: odoo
          POSTGRES_PASSWORD: odoo
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U odoo"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Install & test the module inside the Odoo 19 image
        run: |
          docker run --rm --network host \
            -v "${PWD}/custom_addons:/mnt/extra-addons:ro" \
            odoo:19.0 \
            odoo -d test_db -i odoo_ai_ops \
              --db_host=127.0.0.1 --db_port=5432 --db_user=odoo --db_password=odoo \
              --addons-path=/usr/lib/python3/dist-packages/odoo/addons,/mnt/extra-addons \
              --data-dir=/tmp/odoo-data \
              --test-enable --test-tags /odoo_ai_ops \
              --stop-after-init --no-http --log-level=test

  # ---------------------------------------------------------------------------
  # Terraform fmt + validate (no cloud credentials needed)
  # ---------------------------------------------------------------------------
  terraform:
    name: Terraform validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3

      - name: Format check
        run: terraform fmt -check -recursive

      - name: Init (no backend)
        run: terraform init -backend=false -input=false

      - name: Validate
        run: terraform validate -no-color
