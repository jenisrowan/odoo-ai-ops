services:
  web:
    build:
      context: .
      dockerfile: templates/Dockerfile.odoo
    depends_on:
      - db
      - redis
    ports:
      - "8069:8069"
    volumes:
      - odoo-data:/var/lib/odoo
      - ./dev.conf:/etc/odoo/odoo.conf
      - ./custom_addons:/mnt/extra-addons
    environment:
      - ODOO_STAGE=dev
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_URL=redis://redis:6379

  db:
    image: postgres:16
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_PASSWORD=odoo
      - POSTGRES_USER=odoo
    volumes:
      - db-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  odoo-data:
  db-data:
