# Local development stack mirroring the ECS topology:
#   nginx (sidecar) shared netns -> odoo -> pgbouncer-less direct db
#   agent (FastAPI) -> odoo (JSON-RPC) + redis (Valkey stand-in)
#
# The Nginx container uses `network_mode: service:web` so it shares the Odoo
# container's network namespace exactly like an ECS awsvpc sidecar. That makes
# the baked-in nginx.conf upstream `127.0.0.1:8069` resolve to Odoo locally, so
# the same proxy config runs in dev and prod. Because nginx shares web's
# namespace, all published ports are declared on the `web` service.
services:
  web:
    build:
      context: .
      dockerfile: templates/Dockerfile.odoo
    env_file: .env
    depends_on:
      - db
      - redis
    expose:
      - "8069"
      - "8072"
    ports:
      - "80:80"       # public entrypoint, served by the nginx sidecar
      - "8069:8069"   # direct Odoo access for debugging
    volumes:
      - odoo-data:/var/lib/odoo
      - ./dev.conf:/etc/odoo/odoo.conf
      - ./custom_addons:/mnt/extra-addons   # mount the odoo_ai_ops module
    environment:
      - ODOO_STAGE=dev
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_URL=redis://redis:6379

  # Nginx reverse-proxy sidecar (same network namespace as `web`).
  nginx:
    build:
      context: .
      dockerfile: templates/Dockerfile.nginx
    depends_on:
      - web
    network_mode: "service:web"
    volumes:
      # Live-mount the proxy config for local editing (image bakes the same file).
      - ./templates/nginx.conf:/etc/nginx/nginx.conf:ro

  db:
    image: postgres:16
    environment:
      - POSTGRES_DB=postgres
      - POSTGRES_PASSWORD=odoo
      - POSTGRES_USER=odoo
    volumes:
      - db-data:/var/lib/postgresql/data

  # Local stand-in for ElastiCache Serverless (Valkey 9). Must be the *bundle*
  # image: the LangGraph checkpointer (langgraph-checkpoint-redis) needs the
  # search (FT.*) and json (JSON.*) modules for asetup()/checkpointing.
  redis:
    image: valkey/valkey-bundle:9.1.0
    ports:
      - "6379:6379"

  # FastAPI + LangGraph agent. SQS polling is disabled locally (no AWS); use the
  # REST endpoints directly. Provide ANTHROPIC_API_KEY in your shell to exercise
  # the LLM workflows.
  agent:
    build:
      context: .
      dockerfile: templates/Dockerfile.fastapi
    env_file: .env
    depends_on:
      - web
      - redis
    ports:
      - "8000:8000"
    environment:
      - LOG_LEVEL=INFO
      - ENABLE_SQS_WORKER=false
      - VALKEY_URL=redis://redis:6379
      - ODOO_BASE_URL=http://web:8069
      - ODOO_DB=odoo
      - ODOO_USERNAME=admin
      - ODOO_PASSWORD=admin
      - AI_OPS_SHARED_TOKEN=dev-shared-token
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - MODEL_MEDIUM=claude-haiku-4-5-20251001
      - MODEL_HIGH=claude-sonnet-5
      - LANGFUSE_HOST=http://langfuse-web:3000

  # --- Local Telemetry Stack (Mirroring Production AWS ECS + ClickHouse + S3) ---

  # 1. MinIO (Local S3 Alternative for Langfuse uploads & ClickHouse tiered storage)
  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  # 1b. Setup container to create the events-bucket on startup
  minio-setup:
    image: minio/mc:RELEASE.2025-08-13T08-35-41Z
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 2;
      /usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadmin;
      /usr/bin/mc mb -p myminio/events-bucket;
      exit 0;
      "

  # 2. ClickHouse Analytical DB (using exact prod storage.xml config)
  clickhouse:
    build:
      context: .
      dockerfile: templates/Dockerfile.clickhouse
    depends_on:
      minio-setup:
        condition: service_started
    ports:
      - "8123:8123"
      - "9440:9000"
    environment:
      # Inject AWS credentials into env so ClickHouse <use_environment_credentials> picks them up
      - AWS_ACCESS_KEY_ID=minioadmin
      - AWS_SECRET_ACCESS_KEY=minioadmin
      - AWS_DEFAULT_REGION=us-east-1
      # Local endpoint override used by storage.xml
      - CLICKHOUSE_S3_ENDPOINT=http://minio:9000/events-bucket/clickhouse/
      - CLICKHOUSE_S3_REGION=us-east-1
      - CLICKHOUSE_PASSWORD=clickhouse
    volumes:
      - clickhouse-data:/var/lib/clickhouse

  # 3. Langfuse Web
  langfuse-web:
    image: ghcr.io/langfuse/langfuse:3
    depends_on:
      - db
      - clickhouse
      - minio-setup
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://odoo:odoo@db:5432/postgres
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=local_secret_key_only
      - SALT=local_salt_key_only
      - TELEMETRY_ENABLED=false
      - CLICKHOUSE_URL=http://clickhouse:8123
      - CLICKHOUSE_MIGRATION_URL=clickhouse://clickhouse:9000
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=clickhouse
      - CLICKHOUSE_CLUSTER_ENABLED=false
      - REDIS_CONNECTION_STRING=redis://redis:6379
      - LANGFUSE_S3_EVENT_UPLOAD_ENABLED=true
      - LANGFUSE_S3_EVENT_UPLOAD_BUCKET=events-bucket
      - LANGFUSE_S3_EVENT_UPLOAD_REGION=us-east-1
      - LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT=http://minio:9000
      - LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID=minioadmin
      - LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY=minioadmin
      - LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE=true
      - LANGFUSE_S3_MEDIA_UPLOAD_ENABLED=true
      - LANGFUSE_S3_MEDIA_UPLOAD_BUCKET=events-bucket
      - LANGFUSE_S3_MEDIA_UPLOAD_REGION=us-east-1
      - LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT=http://minio:9000
      - LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID=minioadmin
      - LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY=minioadmin
      - LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE=true

  # 4. Langfuse Worker
  langfuse-worker:
    image: ghcr.io/langfuse/langfuse-worker:3
    depends_on:
      - db
      - clickhouse
      - langfuse-web
      - minio-setup
    environment:
      - DATABASE_URL=postgresql://odoo:odoo@db:5432/postgres
      - SALT=local_salt_key_only
      - TELEMETRY_ENABLED=false
      - CLICKHOUSE_URL=http://clickhouse:8123
      - CLICKHOUSE_MIGRATION_URL=clickhouse://clickhouse:9000
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=clickhouse
      - CLICKHOUSE_CLUSTER_ENABLED=false
      - REDIS_CONNECTION_STRING=redis://redis:6379
      - LANGFUSE_S3_EVENT_UPLOAD_ENABLED=true
      - LANGFUSE_S3_EVENT_UPLOAD_BUCKET=events-bucket
      - LANGFUSE_S3_EVENT_UPLOAD_REGION=us-east-1
      - LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT=http://minio:9000
      - LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID=minioadmin
      - LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY=minioadmin
      - LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE=true
      - LANGFUSE_S3_MEDIA_UPLOAD_ENABLED=true
      - LANGFUSE_S3_MEDIA_UPLOAD_BUCKET=events-bucket
      - LANGFUSE_S3_MEDIA_UPLOAD_REGION=us-east-1
      - LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT=http://minio:9000
      - LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID=minioadmin
      - LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY=minioadmin
      - LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE=true

volumes:
  odoo-data:
  db-data:
  minio-data:
  clickhouse-data:
