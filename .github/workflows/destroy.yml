name: Destroy Infrastructure via Terraform

on:
  workflow_dispatch:

env:
  AWS_REGION: ap-south-1

permissions:
  id-token: write
  contents: read

jobs:
  destroy:
    name: Destroy All Resources
    runs-on: ubuntu-latest
    environment: production

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v6
      with:
        role-to-assume: ${{ vars.AWS_OIDC_ROLE_ARN }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v4
      with:
        terraform_version: "1.15.7"

    - name: Terraform Init
      working-directory: ./terraform
      run: terraform init -input=false

    # Fast + forceful full teardown (everything, including WAF & CloudFront).
    #   -refresh=false : skip the state-refresh pass (biggest speedup)
    #   -parallelism=30: more concurrent deletes (default is 10)
    #   -lock-timeout  : wait briefly for the state lock instead of failing fast
    # All image vars have defaults, so none are needed for a destroy.
    # CloudFront (~20 min to delete) dominates the wall-clock; everything
    # expensive (RDS, ElastiCache, ECS, NAT, EBS) is gone within a few minutes.
    - name: Retain CloudWatch Logs
      working-directory: ./terraform
      run: |
        # Remove log groups from Terraform state so they survive the destroy
        terraform state rm module.ecs.aws_cloudwatch_log_group.odoo_logs || true
        terraform state rm module.ecs.aws_cloudwatch_log_group.fastapi_logs || true
        terraform state rm module.telemetry.aws_cloudwatch_log_group.clickhouse || true
        terraform state rm module.telemetry.aws_cloudwatch_log_group.langfuse || true
        terraform state rm module.webhooks.aws_cloudwatch_log_group.webhook_lambda || true
        terraform state rm module.webhooks.aws_cloudwatch_log_group.apigw_access || true

    - name: Terraform Destroy
      working-directory: ./terraform
      run: |
        terraform destroy -auto-approve -input=false \
          -refresh=false -parallelism=30 -lock-timeout=5m
